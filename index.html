<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MIX BOX - সেরা অনলাইন শপিং অভিজ্ঞতা</title>
    <meta name="description" content="MIX BOX - বাংলাদেশের অন্যতম সেরা অনলাইন শপিং মল। সাশ্রয়ী মূল্যে সেরা মানের পণ্য, দ্রুত ডেলিভারি এবং সহজ কেনাকাটার অভিজ্ঞতা।">
    <meta name="keywords" content="MIX BOX, মিক্স বক্স, অনলাইন শপিং, ই-কমার্স, বাংলাদেশ, শপিং মল, সেরা পণ্য, কম দাম">
    
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <link rel="dns-prefetch" href="https://script.google.com">

    <link rel="manifest" href="manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">

    <link rel="icon" type="image/png" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }
        
        /* আইফ্রেম স্টাইল */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #ffffff;
        }

        /* লোডিং স্পিনার স্টাইল */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 15px;
            color: #555;
            font-size: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* SEO Hidden Text */
        .seo-hidden-text {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <div class="spinner"></div>
        <p class="loader-text">MIX BOX লোড হচ্ছে, দয়া করে অপেক্ষা করুন...</p>
    </div>

    <div class="seo-hidden-text">
        <h1>MIX BOX (মিক্স বক্স) - বিশ্বস্ত ই-কমার্স ওয়েবসাইট</h1>
        <p>MIX BOX-এ আপনাকে স্বাগত! এটি বাংলাদেশের অন্যতম জনপ্রিয় একটি অনলাইন শপ।</p>
        <h2>আমাদের ক্যাটাগরি এবং কেনাকাটা</h2>
        <ul>
            <li>সেরা মানের পণ্যের নিশ্চয়তা।</li>
            <li>দ্রুত ডেলিভারি এবং নিরাপদ পেমেন্ট।</li>
        </ul>
    </div>

    <iframe 
        id="shopFrame"
        src="https://script.google.com/macros/s/AKfycbw2bUkm9jVOiP6Vz5ijRgLVgRQInZUh_o0ag4guwSM44rwR4961RQJek6dS-wnQOwvW/exec" 
        loading="eager"
        fetchpriority="high"
        onload="hideLoader()">
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader-container');
            // একটু স্মুথ ট্রানজিশনের জন্য ০.৫ সেকেন্ড পর হাইড হবে
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 500);
            }, 500);
        }
    </script>

</body>
</html>
