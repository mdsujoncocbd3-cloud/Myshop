<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>MIX BOX - সেরা অনলাইন শপিং অভিজ্ঞতা</title>
    <meta name="description" content="MIX BOX - বাংলাদেশের অন্যতম সেরা অনলাইন শপিং মল। সাশ্রয়ী মূল্যে সেরা মানের পণ্য, দ্রুত ডেলিভারি এবং সহজ কেনাকাটার অভিজ্ঞতা।">
    <meta name="keywords" content="MIX BOX, মিক্স বক্স, অনলাইন শপিং, ই-কমার্স, বাংলাদেশ, শপিং মল, সেরা পণ্য, কম দাম">
    
    <link rel="preconnect" href="https://script.google.com">
    <link rel="preconnect" href="https://script.googleusercontent.com">
    <link rel="dns-prefetch" href="https://script.google.com">

    <link rel="manifest" href="manifest.json">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">

    <link rel="icon" type="image/png" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2">

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background-color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        /* আইফ্রেম স্টাইল */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
            background-color: #ffffff;
        }

        /* কাস্টম ব্র্যান্ডিং লোডার কন্টেইনার */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease-out, visibility 0.6s ease-out;
        }

        /* লোগো অ্যানিমেশন (হালকা পালস ইফেক্ট) */
        .brand-logo {
            width: 120px; /* লোগোর সাইজ প্রয়োজন অনুযায়ী পরিবর্তন করতে পারেন */
            height: auto;
            margin-bottom: 15px;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        /* সাইট নেম শাইনিং অ্যানিমেশন */
        .brand-name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
            /* কালার গ্রেডিয়েন্ট - আপনি চাইলে আপনার ব্র্যান্ডের কালার দিতে পারেন */
            background: linear-gradient(90deg, #111111, #ff0055, #111111);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine-text 2s linear infinite;
        }

        @keyframes shine-text {
            to {
                background-position: 200% center;
            }
        }

        /* নিচে ছোট লোডিং টেক্সট */
        .loading-subtext {
            font-size: 14px;
            color: #666666;
            margin-top: 10px;
            letter-spacing: 3px;
            animation: fade-text 1.5s infinite ease-in-out;
        }

        @keyframes fade-text {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* SEO Hidden Text */
        .seo-hidden-text {
            position: absolute;
            width: 1px;
            height: 1px;
            margin: -1px;
            padding: 0;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <div id="loader-container">
        <img src="https://i.postimg.cc/8zKG1ndp/20260113-210931.png?v=2" alt="MIX BOX Logo" class="brand-logo">
        <h1 class="brand-name">MIX BOX</h1>
        <div class="loading-subtext">LOADING...</div>
    </div>

    <div class="seo-hidden-text">
        <h1>MIX BOX (মিক্স বক্স) - বিশ্বস্ত ই-কমার্স ওয়েবসাইট</h1>
        <p>MIX BOX-এ আপনাকে স্বাগত! এটি বাংলাদেশের অন্যতম জনপ্রিয় একটি অনলাইন শপ।</p>
        <h2>আমাদের ক্যাটাগরি এবং কেনাকাটা</h2>
        <ul>
            <li>সেরা মানের পণ্যের নিশ্চয়তা।</li>
            <li>দ্রুত ডেলিভারি এবং নিরাপদ পেমেন্ট।</li>
        </ul>
    </div>

    <iframe 
        id="shopFrame"
        src="https://script.google.com/macros/s/AKfycbzr8kh_3KoQlI7vWlETtlBzZMiZNlE-65vHDP82nbCXnWtLlISW0keulJvbjvhKfMzW/exec" 
        loading="eager"
        fetchpriority="high"
        onload="hideLoader()">
    </iframe>

    <script>
        function hideLoader() {
            const loader = document.getElementById('loader-container');
            // আইফ্রেম লোড হওয়ার পর লোডারটি স্মুথভাবে মুছে যাবে
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 600); // 0.6 সেকেন্ড ট্রানজিশন সময়
        }
    </script>

</body>
</html>
